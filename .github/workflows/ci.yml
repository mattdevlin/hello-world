name: CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devpro-wall-builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: devpro-wall-builder/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
